name: Refresh catalog

on:
  schedule:
    # Daily at 13:00 UTC (≈ morning US time). Sony rotates Extra tier monthly
    # but Wikipedia + new crossplay metadata update more often, so daily is fine.
    - cron: "0 13 * * *"
  workflow_dispatch: {}
  push:
    paths:
      - "pipeline/**"
      - "overrides/**"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write

concurrency:
  group: refresh-catalog
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: pip install -e .

      - name: Build catalog
        env:
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: python -m pipeline.build

      - name: Sync to web/
        run: cp games.json web/games.json

      - name: Commit refreshed catalog
        run: |
          if git diff --quiet games.json web/games.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games.json web/games.json
          COUNT=$(python -c "import json; print(len(json.load(open('games.json'))))")
          git commit -m "chore(catalog): refresh ($COUNT games)"
          git push
